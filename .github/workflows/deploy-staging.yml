name: 🚀 Deploy API to Staging

on:
    push:
        branches:
            - staging

concurrency:
    group: deploy-staging-${{ github.ref }}
    cancel-in-progress: true

jobs:
    deploy-staging:
        name: Deploy to Staging VPS
        runs-on: ubuntu-latest
        environment: staging

        steps:
            - name: 🔔 Notify deploy start
              run: echo "Deploying staging branch to VPS..."

            - name: 🚀 Deploy via SSH
              uses: appleboy/ssh-action@v1
              with:
                  host: ${{ secrets.VPS_HOST }}
                  username: ${{ secrets.VPS_USERNAME }}
                  key: ${{ secrets.VPS_SSH_KEY }}
                  port: ${{ secrets.VPS_PORT }}
                  command_timeout: 20m
                  envs: CI
                  script: |
                      set -ex
                      export CI=true
                      export NVM_DIR="$HOME/.nvm"
                      [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

                      echo "📂 Navigating to staging directory..."
                      cd /var/www/test-mandalika

                      echo "🔄 Pulling latest staging code..."
                      git fetch origin staging
                      git reset --hard origin/staging

                      echo "📦 Installing dependencies..."
                      npm ci --no-audit --no-fund

                      echo "🗃️ Pushing Prisma schema (non-interactive)..."
                      npx --yes prisma db push --accept-data-loss --skip-generate
                      npx --yes prisma generate

                      echo "🔨 Building application..."
                      npm run build

                      echo "🧹 Pruning dev dependencies..."
                      npm prune --omit=dev

                      echo "♻️ Reloading application..."
                      pm2 reload test-api --update-env || pm2 start npm --name test-api -- run start

                      echo "💾 Persisting pm2 process list..."
                      pm2 save

                      echo "✅ Staging deployment complete!"
